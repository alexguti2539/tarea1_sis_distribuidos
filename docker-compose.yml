services:
  redis_cache:
    image: redis:alpine
    command: redis-server --maxmemory 500mb --maxmemory-policy allkeys-lfu
    ports:
      - "6379:6379"

  app:
    build: .
    volumes:
      - .:/app
    depends_on:
      - redis_cache
    environment:
      - REDIS_HOST=redis_cache